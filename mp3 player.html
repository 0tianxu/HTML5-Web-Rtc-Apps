<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Mp3 Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap');

        :root {
            --bg-color: #06080c;
            --sidebar-color: rgba(14, 18, 26, 0.9);
            --panel-color: rgba(21, 26, 36, 0.8);
            --accent-color: #00ff88;
            --text-color: #ffffff;
            --text-muted: #62728f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--text-color);
            font-family: 'Space Grotesk', -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Particle Canvas background layer */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Sidebar Styling (Left Side) */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--sidebar-color);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 2;
            backdrop-filter: blur(20px);
            box-shadow: 5px 0 30px rgba(0, 0, 0, 0.5);
        }

        .brand-header {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 25px;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--accent-color), 0 0 40px var(--accent-color);
        }

        .queue-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0; 
        }

        .queue-container h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 700;
        }

        .queue-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
        }

        .queue-list::-webkit-scrollbar {
            width: 4px;
        }
        .queue-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .queue-item {
            padding: 10px 14px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .queue-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(3px);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .queue-item.active {
            background: rgba(255, 255, 255, 0.03);
            border-color: var(--accent-color);
            color: var(--accent-color);
            font-weight: 500;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3), inset 0 0 10px rgba(0, 255, 136, 0.1);
            text-shadow: 0 0 12px var(--accent-color);
        }

        .queue-item span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.85rem;
            max-width: 210px;
        }

        .customizer-section {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .setting-group {
            margin-bottom: 15px;
        }

        .setting-group label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .theme-swatches {
            display: flex;
            gap: 10px;
        }

        .swatch {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .swatch:hover {
            transform: scale(1.2);
        }

        .swatch.selected {
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        /* Main Display (Right Side) */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            height: 100%;
            justify-content: space-between;
            z-index: 1;
            position: relative;
            will-change: transform;
        }

        #visualizer {
            width: 100%;
            flex: 1;
            background: rgba(8, 10, 15, 0.7);
            border-radius: 12px;
            margin-bottom: 20px;
            min-height: 100px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6), inset 0 0 30px rgba(0,0,0,0.8);
        }

        .player-deck {
            background: var(--panel-color);
            padding: 24px;
            border-radius: 12px;
            /* Enhanced heavy glow container boundary */
            box-shadow: 0 15px 35px rgba(0,0,0,0.7), 0 0 30px rgba(0, 255, 136, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(20px);
            transition: box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #now-playing {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .deck-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
        }

        audio {
            flex: 1;
            min-width: 240px;
            height: 40px;
            filter: invert(0.9) hue-rotate(180deg) drop-shadow(0 0 8px rgba(255,255,255,0.15));
        }

        /* High Visibility Glowing Buttons */
        .btn {
            background: var(--accent-color);
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            /* Massive initial accent glow */
            box-shadow: 0 0 20px var(--accent-color), 0 0 40px rgba(0, 255, 136, 0.2);
        }

        .btn:hover {
            box-shadow: 0 0 35px var(--accent-color), 0 0 60px var(--accent-color);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 25px rgba(255,255,255,0.15);
        }

        input[type="file"] {
            display: none;
        }

        .footer {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        .footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(0, 255, 136, 0.4);
        }
        
        .footer a:hover {
            text-decoration: underline;
            text-shadow: 0 0 15px var(--accent-color);
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="sidebar">
        <div class="brand-header">
            <span>⚡</span> Unblocked Player
        </div>

        <div class="queue-container">
            <h3>Tracks List</h3>
            <ul id="queue-list" class="queue-list"></ul>
        </div>

        <div class="customizer-section">
            <div class="setting-group">
                <label>Theme Style</label>
                <div class="theme-swatches">
                    <div class="swatch selected" style="background: #00ff88;" data-color="#00ff88"></div>
                    <div class="swatch" style="background: #ff007f;" data-color="#ff007f"></div>
                    <div class="swatch" style="background: #00d2ff;" data-color="#00d2ff"></div>
                    <div class="swatch" style="background: #ffaa00;" data-color="#ffaa00"></div>
                </div>
            </div>
            
            <div class="setting-group">
                <label for="bg-input" class="btn btn-secondary" style="width: 100%; justify-content: center; border-radius: 8px; padding: 8px;">🖼️ Change Cover Wall</label>
                <input type="file" id="bg-input" accept="image/*">
            </div>

            <div class="footer">
                made by <a href="https://github.com/0tianxu" target="_blank">@0tianxu</a>
            </div>
        </div>
    </div>

    <div class="main-content" id="main-content-panel">
        <canvas id="visualizer"></canvas>
        
        <div class="player-deck" id="player-deck-module">
            <div id="now-playing">No active track</div>
            
            <div class="deck-actions">
                <label class="btn" id="main-upload-btn" for="file-input">➕ Upload Music Files</label>
                <input type="file" id="file-input" accept="audio/*" multiple>
                
                <audio id="audio-player" controls></audio>
            </div>
        </div>
    </div>

<script>
    const audioPlayer = document.getElementById('audio-player');
    const fileInput = document.getElementById('file-input');
    const bgInput = document.getElementById('bg-input');
    const queueList = document.getElementById('queue-list');
    const nowPlaying = document.getElementById('now-playing');
    const canvas = document.getElementById('visualizer');
    const canvasCtx = canvas.getContext('2d');
    const swatches = document.querySelectorAll('.swatch');
    const mainContentPanel = document.getElementById('main-content-panel');
    const playerDeckModule = document.getElementById('player-deck-module');
    const mainUploadBtn = document.getElementById('main-upload-btn');

    let queue = [];
    let currentTrackIndex = 0;
    let audioContext, analyser, dataArray, bufferLength, source;
    let isAudioContextSetup = false;
    let waveColor = '#00ff88';

    // Particle Background System setup
    const pCanvas = document.getElementById('particle-canvas');
    const pCtx = pCanvas.getContext('2d');
    let particlesArray = [];

    function resizeParticleCanvas() {
        pCanvas.width = window.innerWidth;
        pCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeParticleCanvas);
    resizeParticleCanvas();

    class Particle {
        constructor() {
            this.x = Math.random() * pCanvas.width;
            this.y = Math.random() * pCanvas.height;
            this.size = Math.random() * 3.5 + 1.0; // Slightly larger particles
            this.speedX = Math.random() * 0.4 - 0.2;
            this.speedY = Math.random() * -0.6 - 0.2; // Drift faster upwards
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.y < 0) {
                this.y = pCanvas.height;
                this.x = Math.random() * pCanvas.width;
            }
            if (this.x < 0 || this.x > pCanvas.width) {
                this.speedX = -this.speedX;
            }
        }
        draw() {
            // High visibility alpha blended white core with dynamic theme hue outer halos
            let gradient = pCtx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.95)'); // Bright white center
            gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.60)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

            pCtx.fillStyle = gradient;
            pCtx.beginPath();
            pCtx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
            pCtx.fill();
        }
    }

    function initParticles() {
        particlesArray = [];
        for (let i = 0; i < 75; i++) { // Dense cluster counts
            particlesArray.push(new Particle());
        }
    }
    initParticles();

    function animateParticles() {
        pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
        for (let i = 0; i < particlesArray.length; i++) {
            particlesArray[i].update();
            particlesArray[i].draw();
        }
        requestAnimationFrame(animateParticles);
    }
    animateParticles();


    // Music Processing Engine
    fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files);
        files.forEach(file => {
            const track = {
                name: file.name.replace(/\.[^/.]+$/, ""),
                url: URL.createObjectURL(file)
            };
            queue.push(track);
        });
        updateQueueUI();
        
        if (audioPlayer.paused && !audioPlayer.src && queue.length > 0) {
            loadTrack(0);
        }
    });

    function updateQueueUI() {
        queueList.innerHTML = '';
        queue.forEach((track, index) => {
            const li = document.createElement('li');
            li.className = `queue-item ${index === currentTrackIndex && audioPlayer.src ? 'active' : ''}`;
            li.innerHTML = `<span>${index + 1}. ${track.name}</span>`;
            li.addEventListener('click', () => loadTrack(index));
            queueList.appendChild(li);
        });
    }

    function loadTrack(index) {
        if (index < 0 || index >= queue.length) return;
        currentTrackIndex = index;
        audioPlayer.src = queue[index].url;
        nowPlaying.textContent = queue[index].name;
        updateQueueUI();
        
        if (!isAudioContextSetup) {
            setupVisualizer();
        }
        audioPlayer.play().catch(() => {});
    }

    audioPlayer.addEventListener('ended', () => {
        if (currentTrackIndex + 1 < queue.length) {
            loadTrack(currentTrackIndex + 1);
        }
    });

    bgInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const imageUrl = URL.createObjectURL(file);
            document.body.style.backgroundImage = `url('${imageUrl}')`;
        }
    });

    swatches.forEach(swatch => {
        swatch.addEventListener('click', (e) => {
            document.querySelector('.swatch.selected').classList.remove('selected');
            swatch.classList.add('selected');
            
            const selectedColor = swatch.getAttribute('data-color');
            document.documentElement.style.setProperty('--accent-color', selectedColor);
            waveColor = selectedColor;
            
            // Alter module glow profiles dynamically to lock down clean UI cohesiveness
            playerDeckModule.style.boxShadow = `0 15px 35px rgba(0,0,0,0.7), 0 0 30px ${selectedColor}26`;
            mainUploadBtn.style.boxShadow = `0 0 20px ${selectedColor}, 0 0 40px ${selectedColor}33`;
            document.querySelector('.brand-header').style.textShadow = `0 0 20px ${selectedColor}, 0 0 40px ${selectedColor}`;
        });
    });

    function setupVisualizer() {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        source = audioContext.createMediaElementSource(audioPlayer);
        source.connect(analyser);
        analyser.connect(audioContext.destination);

        analyser.fftSize = 128;
        bufferLength = analyser.frequencyBinCount;
        dataArray = new Uint8Array(bufferLength);

        isAudioContextSetup = true;
        drawVisualizer();
    }

    function drawVisualizer() {
        requestAnimationFrame(drawVisualizer);

        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;

        analyser.getByteFrequencyData(dataArray);
        canvasCtx.clearRect(0, 0, canvas.width, canvas.height);

        const barWidth = (canvas.width / bufferLength) * 1.3;
        let barHeight;
        let x = 0;
        let totalVolume = 0; 

        for (let i = 0; i < bufferLength; i++) {
            barHeight = dataArray[i] / 1.5;
            totalVolume += dataArray[i];

            canvasCtx.fillStyle = waveColor;
            canvasCtx.globalAlpha = Math.max(0.25, barHeight / 160); 
            
            canvasCtx.fillRect(x, canvas.height - barHeight, barWidth - 4, barHeight);
            x += barWidth;
        }
        canvasCtx.globalAlpha = 1.0;

        // Reactive Module Shaking Engine calculation
        const averageVolume = totalVolume / bufferLength;
        const intensityThreshold = 135; // Lowered slightly so shake engages more responsively

        if (averageVolume > intensityThreshold && !audioPlayer.paused) {
            const shakeIntensity = (averageVolume - intensityThreshold) * 0.15; 
            const randomX = (Math.random() - 0.5) * shakeIntensity;
            const randomY = (Math.random() - 0.5) * shakeIntensity;
            
            mainContentPanel.style.transform = `translate(${randomX}px, ${randomY}px)`;
            // Double down glow during intense peaks
            playerDeckModule.style.boxShadow = `0 15px 35px rgba(0,0,0,0.7), 0 0 45px var(--accent-color)`;
        } else {
            mainContentPanel.style.transform = 'translate(0px, 0px)';
            playerDeckModule.style.boxShadow = `0 15px 35px rgba(0,0,0,0.7), 0 0 30px rgba(0, 255, 136, 0.15)`;
        }
    }
</script>
</body>
</html>
